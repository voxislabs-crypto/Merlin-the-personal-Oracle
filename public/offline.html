<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Merlin</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fcd34d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      margin: 0 0 1rem 0;
    }
    p {
      font-size: 1.125rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    .reconnect {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: rgba(252, 211, 77, 0.1);
      border: 1px solid rgba(252, 211, 77, 0.3);
      border-radius: 0.5rem;
      color: #fcd34d;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .reconnect:hover {
      background: rgba(252, 211, 77, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌙</h1>
    <h2 style="color: #fcd34d; margin: 0 0 1rem 0;">You're Offline</h2>
    <p>
      The stars are still there.<br>
      Just waiting for your connection to come back.
    </p>
    <button class="reconnect" onclick="window.location.reload()">
      Try Reconnecting
    </button>
  </div>
</body>
</html>
