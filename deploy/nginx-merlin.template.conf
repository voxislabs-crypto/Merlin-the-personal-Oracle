server {
    listen 80;
    listen [::]:80;
    server_name merlin.voxislabs.com;

    # If Merlin is an API-only backend, keep this proxy-only block.
    # If Merlin has its own frontend/static build, replace this with root/index handling.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for streaming AI responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header X-Accel-Buffering no;
    }
}
